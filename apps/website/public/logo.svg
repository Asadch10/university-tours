<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="University Campus Private Tours crest">
  <defs>
    <path id="uniArc" d="M54 82 Q100 44 146 82" />
    <clipPath id="fieldClip">
      <path d="M40 44 Q100 30 160 44 L160 116 C160 167 131 196 100 217 C69 196 40 167 40 116 Z" />
    </clipPath>
  </defs>

  <!-- Outer edge -->
  <path d="M26 33 Q100 16 174 33 L174 118 C174 177 140 209 100 235 C60 209 26 177 26 118 Z" fill="#4d0e18"/>
  <!-- Maroon frame -->
  <path d="M31 37 Q100 21 169 37 L169 117 C169 173 137 204 100 228 C63 204 31 173 31 117 Z" fill="#6b1521"/>

  <!-- Quartered field (clipped to inner shield) -->
  <g clip-path="url(#fieldClip)">
    <rect x="30" y="108" width="140" height="132" fill="#fbf8f3"/>
    <!-- checker: maroon top-left + bottom-right -->
    <rect x="30" y="108" width="70" height="50" fill="#6b1521"/>
    <rect x="100" y="158" width="70" height="82" fill="#6b1521"/>
    <!-- cross dividers -->
    <line x1="100" y1="108" x2="100" y2="220" stroke="#fbf8f3" stroke-width="2.4"/>
    <line x1="40" y1="158" x2="160" y2="158" stroke="#fbf8f3" stroke-width="2.4"/>
  </g>

  <!-- Inner cream border -->
  <path d="M40 44 Q100 30 160 44 L160 116 C160 167 131 196 100 217 C69 196 40 167 40 116 Z" fill="none" stroke="#f3e1a8" stroke-width="2.4" opacity="0.9"/>

  <!-- Arched wordmark -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="25" letter-spacing="0.5" fill="#fbf8f3">
    <textPath href="#uniArc" startOffset="50%" text-anchor="middle">UNIVERSITY</textPath>
  </text>

  <!-- Gold ribbon line -->
  <line x1="58" y1="95" x2="70" y2="95" stroke="#eccb72" stroke-width="1.6"/>
  <line x1="130" y1="95" x2="142" y2="95" stroke="#eccb72" stroke-width="1.6"/>
  <text x="100" y="98" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="8" letter-spacing="1.5" fill="#eccb72">campus private tours</text>

  <!-- Top-left: open book (cream on maroon) -->
  <path d="M46 127 C53 124 61 125 65 128 L65 143 C61 140 53 139 46 142 Z" fill="#fbf8f3"/>
  <path d="M84 127 C77 124 69 125 65 128 L65 143 C69 140 77 139 84 142 Z" fill="#fbf8f3" opacity="0.92"/>

  <!-- Top-right: graduation cap (maroon on cream) -->
  <path d="M118 131 L135 124 L152 131 L135 138 Z" fill="#6b1521"/>
  <path d="M126 135 L126 142 C126 145 144 145 144 142 L144 135" stroke="#6b1521" stroke-width="2.2" fill="none"/>
  <line x1="152" y1="131" x2="152" y2="140" stroke="#6b1521" stroke-width="1.6"/>
  <circle cx="152" cy="141" r="1.8" fill="#6b1521"/>

  <!-- Bottom-left: torch (maroon stem, gold flame, on cream) -->
  <path d="M65 170 C60 175 61 181 65 184 C69 181 70 175 65 170 Z" fill="#eccb72"/>
  <rect x="63" y="184" width="4" height="13" fill="#6b1521"/>
  <rect x="57" y="197" width="16" height="3.2" rx="1" fill="#6b1521"/>

  <!-- Bottom-right: column (cream on maroon) -->
  <rect x="123" y="176" width="24" height="3.2" rx="1" fill="#fbf8f3"/>
  <rect x="126.5" y="180" width="2.8" height="15" fill="#fbf8f3"/>
  <rect x="133.6" y="180" width="2.8" height="15" fill="#fbf8f3"/>
  <rect x="140.7" y="180" width="2.8" height="15" fill="#fbf8f3"/>
  <rect x="123" y="195" width="24" height="3.2" rx="1" fill="#fbf8f3"/>
</svg>
