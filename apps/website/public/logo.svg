<svg width="120" height="140" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="University Campus Private Tours crest">
  <defs>
    <linearGradient id="crest" x1="0" y1="0" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7a1a32"/>
      <stop offset="1" stop-color="#6b1521"/>
    </linearGradient>
  </defs>
  <!-- Shield -->
  <path d="M60 4 L112 18 V70 C112 102 90 124 60 136 C30 124 8 102 8 70 V18 Z" fill="url(#crest)"/>
  <path d="M60 12 L104 24 V69 C104 96 86 116 60 127 C34 116 16 96 16 69 V24 Z" fill="none" stroke="#f3e1a8" stroke-width="1.5" opacity="0.85"/>
  <!-- Banner -->
  <path d="M22 34 H98 L92 46 H28 Z" fill="#3d0a12"/>
  <text x="60" y="44" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="11" letter-spacing="2.5" fill="#fbf8f3">UNIVERSITY</text>
  <text x="60" y="57" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="5.5" letter-spacing="2" fill="#eccb72">CAMPUS PRIVATE TOURS</text>
  <!-- Quartered field divider -->
  <line x1="60" y1="64" x2="60" y2="116" stroke="#f3e1a8" stroke-width="1.2" opacity="0.6"/>
  <line x1="24" y1="90" x2="96" y2="90" stroke="#f3e1a8" stroke-width="1.2" opacity="0.6"/>
  <!-- Open book (top-left) -->
  <path d="M32 78 C36 75 42 75 45 77 V87 C42 85 36 85 32 88 Z" fill="#fbf8f3"/>
  <path d="M58 77 C55 75 49 75 45 77 V87 C49 85 55 85 58 87 Z" fill="#fbf8f3" opacity="0.9"/>
  <!-- Graduation cap (top-right) -->
  <path d="M75 78 L90 82 L75 86 L60 82 Z" fill="#fbf8f3"/>
  <path d="M68 84 V90 C68 92 82 92 82 90 V84" stroke="#fbf8f3" stroke-width="1.6" fill="none"/>
  <!-- Torch (bottom-left) -->
  <path d="M44 100 C44 96 40 94 40 98 C40 94 36 96 36 100 C36 103 38 104 40 104 C42 104 44 103 44 100 Z" fill="#eccb72"/>
  <rect x="39" y="104" width="2" height="10" fill="#fbf8f3"/>
  <!-- Column (bottom-right) -->
  <rect x="70" y="100" width="20" height="2.5" fill="#fbf8f3"/>
  <rect x="72" y="103" width="2.5" height="11" fill="#fbf8f3"/>
  <rect x="78.75" y="103" width="2.5" height="11" fill="#fbf8f3"/>
  <rect x="85.5" y="103" width="2.5" height="11" fill="#fbf8f3"/>
  <rect x="70" y="114" width="20" height="2.5" fill="#fbf8f3"/>
</svg>
